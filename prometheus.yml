global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'otel-stack'

scrape_configs:
  # сам Prometheus
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'otel-collector-internal'
    scrape_interval: 30s
    static_configs:
      - targets: ['otel-collector:8888']

  - job_name: 'otel-collector-exported'
    scrape_interval: 15s
    honor_labels: true
    static_configs:
      - targets: ['otel-collector:8889']

  # Jaeger
  - job_name: 'jaeger'
    static_configs:
      - targets: ['jaeger:14269']

  # Loki
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']
