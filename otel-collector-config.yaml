receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        max_recv_msg_size_mib: 16
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "http://*"
            - "https://*"
          allowed_headers:
            - "*"
          max_age: 7200

  # метрики хоста (CPU/RAM/диск/сеть контейнера)
  hostmetrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      filesystem: {}
      network: {}
      load: {}

processors:
  memory_limiter:
    check_interval: 5s
    limit_percentage: 80
    spike_limit_percentage: 25

  batch:
    timeout: 5s
    send_batch_size: 1000
    send_batch_max_size: 2000

  # окружение и общие атрибуты ко всем сигналам
  resource:
    attributes:
      - key: deployment.environment
        value: production
        action: upsert
      - key: collector.name
        value: otel-collector
        action: insert

  resource/fallback:
    attributes:
      - key: service.name
        value: unknown_service
        action: insert

  filter/metrics:
    error_mode: ignore
    metrics:
      metric:
        - 'IsMatch(name, "^process\\.runtime\\.go\\.gc\\.pause_ns$")'

  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    expected_new_traces_per_sec: 100
    policies:
      - name: errors-policy
        type: status_code
        status_code: { status_codes: [ERROR] }
      - name: slow-policy
        type: latency
        latency: { threshold_ms: 500 }
      - name: probabilistic-policy
        type: probabilistic
        probabilistic: { sampling_percentage: 10 }

exporters:
  # трейсы
  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  # метрики
  prometheus:
    endpoint: 0.0.0.0:8889
    resource_to_telemetry_conversion:
      enabled: true
    enable_open_metrics: true

  # логи
  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls:
      insecure: true

  debug:
    verbosity: basic
    sampling_initial: 5
    sampling_thereafter: 200

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  zpages:
    endpoint: 0.0.0.0:55679
  pprof:
    endpoint: 0.0.0.0:1777

service:
  extensions: [health_check, zpages, pprof]
  telemetry:
    logs:
      level: info
    metrics:
      level: detailed
      address: 0.0.0.0:8888

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource, resource/fallback, tail_sampling, batch]
      exporters: [otlp/jaeger]

    metrics:
      receivers: [otlp, hostmetrics]
      processors: [memory_limiter, resource, resource/fallback, filter/metrics, batch]
      exporters: [prometheus]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, resource, resource/fallback, batch]
      exporters: [otlphttp/loki]
